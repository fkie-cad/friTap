name: Feature request
description: Suggest a new feature, library, or behavior change for friTap
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an idea. Before filing, please check [open feature requests](https://github.com/fkie-cad/friTap/issues?q=is%3Aissue+label%3Aenhancement)
        for similar proposals. New SSL/TLS library support requests are especially welcome —
        see [CONTRIBUTING.md](https://github.com/fkie-cad/friTap/blob/main/CONTRIBUTING.md) for
        the contribution path.

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Why is it useful for friTap users in general (not just your single use case)?
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: Proposed behavior
      description: |
        What should happen? If you're proposing a CLI flag, name it. If you're proposing a
        new SSL/TLS library, link to its source.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, related tools, or approaches you've ruled out.
    validations:
      required: false

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a PR for this.
          required: false
