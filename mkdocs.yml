site_name: friTap Documentation
site_description: Comprehensive SSL/TLS traffic analysis and key extraction tool
site_author: Fraunhofer FKIE CAD
site_url: https://fkie-cad.github.io/friTap

repo_name: fkie-cad/friTap
repo_url: https://github.com/fkie-cad/friTap
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: blue grey
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: blue grey
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
  - git-revision-date-localized:
      enable_creation_date: true
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - footnotes
  - abbr

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
    - Basic Concepts: getting-started/concepts.md
    - Interactive TUI: getting-started/tui.md
    - Offline Quick Start: getting-started/offline-quickstart.md
  - Usage Examples:
    - Overview: examples/index.md
    - Desktop Applications: examples/desktop.md
    - Android Applications: examples/android.md
    - Malware Analysis: examples/malware.md
  - Platform Guides:
    - Overview: platforms/index.md
    - Android: platforms/android.md
    - iOS: platforms/ios.md
    - Linux: platforms/linux.md
    - macOS: platforms/macos.md
    - Windows: platforms/windows.md
    - Wine: platforms/wine.md
  - Advanced Features:
    - Pattern-based Hooking: advanced/patterns.md
    - Standalone Agent Usage: advanced/standalone-agent.md
    - Traffic Analysis: advanced/traffic-analysis.md
    - Offline pcap to .tap: advanced/offline-pcap-to-tap.md
  - Protocols:
    - QUIC & HTTP/3: protocols/quic.md
    - SSH (OpenSSH & libssh): protocols/ssh.md
    - OHTTP (Oblivious HTTP): protocols/ohttp.md
    - IPsec (Experimental): protocols/ipsec.md
    - Telegram (MTProto): protocols/telegram.md
  - SSL/TLS Libraries:
    - Overview: libraries/index.md
    - BoringSSL: libraries/boringssl.md
    - Cronet & Mainline Cronet: libraries/cronet.md
    - Other Libraries: libraries/others.md
  - API Reference:
    - Python API: api/python.md
    - CLI Reference: api/cli.md
    - .tap File Format: api/tap-format.md
  - Troubleshooting:
    - Common Issues: troubleshooting/common-issues.md
  - Development:
    - Contributing: development/contributing.md
    - Architecture: development/architecture.md
    - Development Setup: development/development-setup.md
    - Coding Standards: development/coding-standards.md
    - Testing Guide: development/testing.md
    - Adding Features: development/adding-features.md
    - Plugins & Custom Scripts: development/plugins.md
    - Documentation: development/documentation.md
    - Pull Requests: development/pull-requests.md
    - Community: development/community.md
    - Contributing to Docs: CONTRIBUTING_TO_DOCS.md
    - Release Process: development/release-process.md

